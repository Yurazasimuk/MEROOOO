<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERO | Sign In</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="content-loaded">

    <div class="auth-page">
        <div class="auth-page-image">
            <img src="https://i.pinimg.com/736x/43/d8/33/43d833f7820496e9a46a07e5aeddbb01.jpg" alt="MERO Lifestyle">
            <div class="auth-image-overlay">
                <a href="index.html" class="auth-logo">MERO</a>
                <p>Join the club.</p>
            </div>
        </div>

        <div class="auth-page-content">
            <a href="index.html" class="auth-close-page">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </a>

            <div class="auth-form-container">
                <div class="auth-tabs">
                    <button class="auth-tab active" data-target="form-login">SIGN IN</button>
                    <button class="auth-tab" data-target="form-register">REGISTER</button>
                </div>

                <form class="auth-form active" id="form-login">
                    <div class="input-group">
                        <input type="email" required>
                        <label>Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="password" required>
                        <label>Password</label>
                    </div>
                    <button type="submit" class="btn-black auth-submit">LOG IN</button>
                    <a href="#" class="auth-forgot">Forgot your password?</a>

                    <div class="auth-divider"><span>or continue with</span></div>
                    <div class="auth-social">
                        <button type="button" class="social-btn" title="Google">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg>
                        </button>
                        <button type="button" class="social-btn" title="Apple">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.19 2.31-.88 3.5-.8 1.5.11 2.78.73 3.56 1.88-3.21 1.88-2.67 5.92.59 7.15-.76 1.62-1.74 3.08-2.73 3.94zM12.03 7.21c-.15-2.24 1.71-4.09 3.84-4.21.36 2.45-1.97 4.39-3.84 4.21z"/></svg>
                        </button>
                        <button type="button" class="social-btn" title="Facebook">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
                        </button>
                    </div>
                </form>

                <form class="auth-form" id="form-register">
                    <div class="input-group">
                        <input type="text" required>
                        <label>Full Name</label>
                    </div>
                    <div class="input-group">
                        <input type="email" required>
                        <label>Email Address</label>
                    </div>
                    <div class="input-group">
                        <input type="password" required>
                        <label>Password</label>
                    </div>
                    <button type="submit" class="btn-black auth-submit">CREATE ACCOUNT</button>

                    <div class="auth-divider"><span>or continue with</span></div>
                    <div class="auth-social">
                        <button type="button" class="social-btn" title="Google">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.806c-.275 1.765-2.056 5.174-6.806 5.174-4.095 0-7.439-3.389-7.439-7.574s3.345-7.574 7.439-7.574c2.33 0 3.891.989 4.785 1.849l3.254-3.138C18.189 1.186 15.479 0 12.24 0c-6.635 0-12 5.365-12 12s5.365 12 12 12c6.926 0 11.52-4.869 11.52-11.726 0-.788-.085-1.39-.189-1.989H12.24z"/></svg>
                        </button>
                        <button type="button" class="social-btn" title="Apple">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.19 2.31-.88 3.5-.8 1.5.11 2.78.73 3.56 1.88-3.21 1.88-2.67 5.92.59 7.15-.76 1.62-1.74 3.08-2.73 3.94zM12.03 7.21c-.15-2.24 1.71-4.09 3.84-4.21.36 2.45-1.97 4.39-3.84 4.21z"/></svg>
                        </button>
                        <button type="button" class="social-btn" title="Facebook">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M22.675 0H1.325C.593 0 0 .593 0 1.325v21.351C0 23.407.593 24 1.325 24H12.82v-9.294H9.692v-3.622h3.128V8.413c0-3.1 1.893-4.788 4.659-4.788 1.325 0 2.463.099 2.795.143v3.24l-1.918.001c-1.504 0-1.795.715-1.795 1.763v2.313h3.587l-.467 3.622h-3.12V24h6.116c.73 0 1.323-.593 1.323-1.325V1.325C24 .593 23.407 0 22.675 0z"/></svg>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
